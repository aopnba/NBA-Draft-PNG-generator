<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NBA Draft Card Generator</title>
  <link rel="stylesheet" href="styles.css?v=20260504a">
  <script src="app.js?v=20260504a" defer></script>
</head>
<body>
  <header class="page-header">
    <h1>NBA Draft Card Builder</h1>
  </header>

  <main class="app-shell">
    <section class="panel controls-panel">
      <form id="player-form" class="search-form">
        <label class="field">
          <span>Player Name</span>
          <div class="search-row">
            <input id="player-search" list="player-options" type="text" placeholder="Start typing a player name" autocomplete="off">
            <button type="submit" id="load-player">Load Player</button>
          </div>
        </label>
        <datalist id="player-options"></datalist>
      </form>

      <div class="details-grid">
        <label class="field">
          <span>Weight (lbs)</span>
          <input id="player-weight" type="number" min="0" step="1" inputmode="numeric">
        </label>

        <label class="field">
          <span>Height</span>
          <input id="player-height" type="text" placeholder="6'9&quot;">
        </label>
      </div>

      <div class="button-row">
        <button type="button" id="reset-overrides" class="ghost-button">Reset Edits</button>
        <button type="button" id="download-card">Download PNG</button>
      </div>

      <p id="status" class="status">Loading players and design assets...</p>
    </section>

    <section class="panel preview-panel">
      <div class="preview-frame">
        <canvas id="card-canvas" width="1080" height="1350" aria-label="Generated NBA draft card preview"></canvas>
      </div>
    </section>
  </main>
</body>
</html>
